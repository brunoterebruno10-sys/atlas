<title>Atlas</title>
<style>
  /* Fontes do sistema — funcionam 100% offline */

  :root{
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
  }

  body[data-theme="dark"]{
    --bg:#0A0E1A; --bg-soft:#0D1220; --surface:#131826; --surface-alt:#1B2233;
    --text:#F3F1EA; --text-muted:#8C93AC; --accent:#D9AE5C; --accent-strong:#F1C879;
    --positive:#7BD9A0; --negative:#E48E8E; --border:rgba(255,255,255,0.07);
    --track:rgba(255,255,255,0.08); --shadow:0 18px 40px rgba(0,0,0,0.45);
    --overlay:rgba(4,5,10,0.6);
  }
  body[data-theme="light"]{
    --bg:#F2F1ED; --bg-soft:#EAE8E2; --surface:#FFFFFF; --surface-alt:#F7F3E9;
    --text:#181B2A; --text-muted:#6B7080; --accent:#A9772E; --accent-strong:#8C5E1F;
    --positive:#2E9A5C; --negative:#C1483F; --border:rgba(20,24,40,0.08);
    --track:rgba(20,24,40,0.09); --shadow:0 16px 30px rgba(20,24,40,0.10);
    --overlay:rgba(20,20,18,0.45);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
    background:#E7E6E2; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:40px 16px;
  }
  button{font-family:inherit;}
  .page{display:flex; flex-direction:column; align-items:center; gap:16px;}

  .phone{
    position:relative; width:390px; height:820px;
    background:#06070B; border-radius:54px; padding:14px;
    box-shadow:0 30px 70px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .notch{
    position:absolute; top:26px; left:50%; transform:translateX(-50%);
    width:110px; height:28px; background:#06070B; border-radius:20px; z-index:6;
  }

  .screen{
    position:relative; width:100%; height:calc(100% - 78px);
    background:var(--bg); border-radius:38px; overflow-y:auto; overflow-x:hidden;
    padding:54px 18px 28px; color:var(--text);
    transition:background-color .45s ease, color .45s ease;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}

  .starfield{position:absolute; inset:0; pointer-events:none; z-index:0; opacity:1; transition:opacity .45s ease;}
  body[data-theme="light"] .starfield{opacity:0;}
  .star{position:absolute; width:3px; height:3px; border-radius:50%; background:#fff; animation:twinkle 4.5s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.15;} 50%{opacity:.8;}}

  section, header.topbar, .view-title{position:relative; z-index:1;}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .brand-mark{font-family:'Georgia','Times New Roman',serif; font-weight:600; font-size:20px; letter-spacing:.5px;}
  .theme-toggle{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--accent);
  }
  .theme-toggle svg{width:18px; height:18px;}
  .theme-toggle svg + svg{display:none;}

  .greeting{margin-bottom:20px;}
  .greeting h1{font-family:'Georgia','Times New Roman',serif; font-weight:600; font-size:26px; margin:0 0 4px;}
  .muted{color:var(--text-muted); font-size:13px; margin:0;}
  .view-title{font-family:'Georgia','Times New Roman',serif; font-weight:600; font-size:24px; margin:0 0 18px;}

  .fade-in{opacity:0; animation:rise .55s ease forwards;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow);}
  .label{font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin:0 0 8px; font-weight:600;}

  .hero-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px 20px; margin-bottom:14px; box-shadow:var(--shadow);}
  .hero-number{font-family:'Georgia','Times New Roman',serif; font-weight:600; font-size:36px; margin:0 0 8px; letter-spacing:-.5px;}
  .delta{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; margin:0;}
  .delta svg{width:14px; height:14px;}
  .positive{color:var(--positive);} .negative{color:var(--negative);}

  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;}
  .card-number{font-size:19px; font-weight:700; margin:0;}
  .card-title{font-size:15px; font-weight:600; margin:0 0 4px;}
  .card-sub{font-size:12.5px; color:var(--text-muted); margin:0; line-height:1.4;}

  .goal-card{margin-bottom:12px;}
  .goal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; gap:8px;}
  .goal-pct{font-size:13px; font-weight:700; color:var(--accent); background:color-mix(in srgb, var(--accent) 16%, transparent); padding:3px 10px; border-radius:20px; flex:none;}
  .progress-track{width:100%; height:8px; border-radius:6px; background:var(--track); overflow:hidden; margin:12px 0 10px;}
  .progress-fill{height:100%; border-radius:6px; background:linear-gradient(90deg, var(--accent), var(--accent-strong)); width:0%; transition:width 1s cubic-bezier(.2,.7,.2,1);}
  .goal-actions{display:flex; gap:8px; margin-top:10px;}

  .health-card{margin-bottom:14px;}
  .gauge-wrap{position:relative; width:172px; height:172px; margin:4px auto 2px;}
  .gauge{width:100%; height:100%;}
  .gauge-track{fill:none; stroke:var(--track); stroke-width:13; stroke-linecap:round;}
  .gauge-progress{fill:none; stroke:var(--accent); stroke-width:13; stroke-linecap:round;}
  .gauge-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .gauge-number{font-family:'Georgia','Times New Roman',serif; font-size:38px; font-weight:600; line-height:1;}
  .gauge-max{font-size:12px; color:var(--text-muted); margin-top:1px;}
  .gauge-status{font-size:12.5px; font-weight:600; color:var(--accent); margin-top:6px;}
  .star-tick{fill:var(--text-muted); opacity:.45;} .star-tick.active{fill:var(--accent-strong); opacity:1;}

  .section-title{display:flex; align-items:center; gap:7px; font-size:14px; font-weight:700; margin:0 0 10px;}
  .section-title svg{width:15px; height:15px; color:var(--accent);}

  .insight-card{display:flex; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; margin-bottom:10px; box-shadow:var(--shadow);}
  .insight-icon{flex:none; width:34px; height:34px; border-radius:50%; background:color-mix(in srgb, var(--accent) 18%, transparent); display:flex; align-items:center; justify-content:center; color:var(--accent);}
  .insight-icon svg{width:16px; height:16px;}
  .insight-text{font-size:13px; line-height:1.45; margin:0; color:var(--text);}
  .insight-text strong{color:var(--accent);}

  /* listas */
  .list-item{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:13px 14px; margin-bottom:9px; box-shadow:var(--shadow);}
  .list-icon{flex:none; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--surface-alt); color:var(--accent);}
  .list-icon svg{width:17px; height:17px;}
  .list-main{flex:1; min-width:0;}
  .list-title{font-size:14px; font-weight:600; margin:0 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .list-sub{font-size:11.5px; color:var(--text-muted); margin:0;}
  .list-amount{font-size:14px; font-weight:700; flex:none; margin-right:2px;}
  .icon-btn{flex:none; width:28px; height:28px; border-radius:50%; border:none; background:none; color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .icon-btn svg{width:15px; height:15px;}
  .icon-btn:hover{color:var(--negative);}

  .account-item .list-title{font-size:15px;}

  .filter-tabs{display:flex; gap:8px; margin-bottom:14px;}
  .filter-tab{flex:1; text-align:center; padding:9px 0; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-size:12.5px; font-weight:600; cursor:pointer;}
  .filter-tab.active{background:var(--accent); color:#1a1305; border-color:var(--accent);}
  body[data-theme="dark"] .filter-tab.active{color:#1a1305;}
  body[data-theme="light"] .filter-tab.active{color:#fff;}

  .empty-state{text-align:center; padding:34px 18px; color:var(--text-muted);}
  .empty-state svg{width:34px; height:34px; color:var(--accent); margin-bottom:10px;}
  .empty-state p{margin:0 0 14px; font-size:13.5px; line-height:1.5;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:14px; padding:11px 18px; font-size:13.5px; font-weight:700; cursor:pointer;}
  .btn-primary{background:linear-gradient(90deg, var(--accent), var(--accent-strong)); color:#1a1305;}
  body[data-theme="light"] .btn-primary{color:#fff;}
  .btn-secondary{background:var(--surface-alt); color:var(--text); border:1px solid var(--border);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 12px; font-size:12.5px; border-radius:11px;}

  .mais-item{display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--border);}
  .mais-item:last-child{border-bottom:none;}
  .mais-item .list-icon{background:var(--surface-alt);}
  .mais-item .list-title{font-size:14.5px;}
  .tag-soon{flex:none; font-size:10.5px; font-weight:700; color:var(--text-muted); background:var(--surface-alt); padding:4px 9px; border-radius:20px; letter-spacing:.03em;}

  .fab{
    position:absolute; right:18px; bottom:88px; width:54px; height:54px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong)); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 14px 26px rgba(0,0,0,0.3); z-index:4;
    color:#1a1305;
  }
  body[data-theme="light"] .fab{color:#fff;}
  .fab svg{width:24px; height:24px;}
  .fab.hidden{display:none;}

  .bottom-spacer{height:6px;}

  .tabbar{position:absolute; left:14px; right:14px; bottom:14px; height:64px; display:flex; align-items:center; justify-content:space-around; border-radius:24px; backdrop-filter:blur(14px); z-index:3;}
  body[data-theme="dark"] .tabbar{background:rgba(19,24,38,0.85); border:1px solid rgba(255,255,255,0.07);}
  body[data-theme="light"] .tabbar{background:rgba(255,255,255,0.88); border:1px solid rgba(20,24,40,0.07);}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; border:none; background:none; cursor:pointer; color:var(--text-muted); font-size:10.5px; font-weight:600;}
  .tab svg{width:20px; height:20px;}
  .tab.active{color:var(--accent);}

  /* modal */
  .modal-overlay{position:absolute; inset:0; background:var(--overlay); opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:10; border-radius:38px;}
  .modal-overlay.open{opacity:1; pointer-events:auto;}
  .modal-sheet{
    position:absolute; left:0; right:0; bottom:0; background:var(--surface);
    border-radius:28px 28px 0 0; padding:20px 20px 26px; transform:translateY(100%);
    transition:transform .3s cubic-bezier(.2,.8,.2,1); max-height:80%; overflow-y:auto;
  }
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .modal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .modal-header h3{font-family:'Georgia','Times New Roman',serif; font-size:18px; font-weight:600; margin:0;}
  .modal-close{border:none; background:var(--surface-alt); color:var(--text-muted); width:28px; height:28px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .modal-close svg{width:14px; height:14px;}

  .form-group{margin-bottom:14px;}
  .form-label{display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px;}
  .form-control{
    width:100%; padding:11px 12px; border-radius:12px; border:1px solid var(--border);
    background:var(--bg-soft); color:var(--text); font-size:14px; font-family:inherit;
  }
  .form-control:focus{outline:2px solid var(--accent); outline-offset:1px;}
  select.form-control{appearance:none;}

  .segmented{display:flex; border-radius:12px; overflow:hidden; border:1px solid var(--border);}
  .segmented button{flex:1; padding:10px 0; border:none; background:var(--bg-soft); color:var(--text-muted); font-weight:700; font-size:13px; cursor:pointer;}
  .segmented button.active{background:var(--accent); color:#1a1305;}
  body[data-theme="light"] .segmented button.active{color:#fff;}

  .modal-actions{display:flex; gap:10px; margin-top:6px;}
  .modal-actions .btn{flex:1;}

  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}

  /* Em um celular real (ou instalado como app na tela inicial), usar a tela cheia de verdade,
     sem a moldura decorativa que existe só para pré-visualização no chat. */
  @media (max-width:480px), (display-mode:standalone){
    body{ padding:0; background:var(--bg); }
    .page{ width:100%; height:100%; gap:0; }
    .phone{ width:100vw; height:100vh; border-radius:0; padding:0; box-shadow:none; background:transparent; }
    .notch{ display:none; }
    .screen{
      width:100%; height:100%; border-radius:0;
      padding-top:calc(20px + env(safe-area-inset-top));

</style>
</head>

<script>
/* ===================== storage ===================== */
async function loadData(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw === null) return fallback;
    return JSON.parse(raw);
  }catch(e){ return fallback; }
}
async function saveData(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.error('Erro ao salvar', key, e); }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ===================== estado ===================== */
let profile = { name:'' };
let accounts = [];      // {id, name, type, balance}
let transactions = [];  // {id, kind:'receita'|'despesa', desc, amount, category, accountId, date}
let goals = [];          // {id, name, target, saved}
let currentView = 'dashboard';

const ACCOUNT_TYPES = ['Corrente','Poupança','Carteira','Investimento'];
const RECEITA_CATS = ['Salário','Freelance','Vendas','Investimentos','Outros'];
const DESPESA_CATS = ['Moradia','Alimentação','Transporte','Lazer','Saúde','Educação','Assinaturas','Outros'];

const fmt = (v) => (v||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
const todayISO = () => new Date().toISOString().slice(0,10);

/* ===================== ícones ===================== */
const ICONS = {
  plus:'<path d="M12 5v14M5 12h14"/>',
  trash:'<path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18"/><circle cx="16" cy="14.5" r="1.2" fill="currentColor" stroke="none"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',
  income:'<path d="M12 19V5M5 12l7-7 7 7"/>',
  expense:'<path d="M12 5v14M5 12l7 7 7-7"/>',
  bulb:'<path d="M12 2l7 4v6c0 5-3 8-7 10-4-2-7-5-7-10V6z"/>',
  alert:'<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>',
  trend:'<path d="M3 17l6-6 4 4 8-9"/><path d="M16 6h5v5"/>',
  sparkle:'<path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2z" fill="currentColor" stroke="none"/>'
};
const icon = (name, cls) => `<svg class="${cls||''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;

/* ===================== gauge helpers ===================== */
function describeArc(cx, cy, r, a1, a2){
  const toPoint = (ang) => { const rad = ang*Math.PI/180; return { x: cx + r*Math.sin(rad), y: cy - r*Math.cos(rad) }; };
  const p1 = toPoint(a1), p2 = toPoint(a2);
  const sweepDeg = ((a2-a1)+360)%360;
  const largeArc = sweepDeg > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y}`;
}
function statusFor(v){ return v>=80?'Excelente':v>=60?'Muito boa':v>=40?'Razoável':v>=1?'Atenção':'—'; }

/* ===================== métricas ===================== */
function computeMetrics(){
  const netWorth = accounts.reduce((s,a)=>s+Number(a.balance||0),0);
  const saldoDisponivel = accounts.filter(a=>a.type!=='Investimento').reduce((s,a)=>s+Number(a.balance||0),0);

  const now = new Date();
  const mTx = transactions.filter(t=>{ const d=new Date(t.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  const receitasMes = mTx.filter(t=>t.kind==='receita').reduce((s,t)=>s+Number(t.amount||0),0);
  const despesasMes = mTx.filter(t=>t.kind==='despesa').reduce((s,t)=>s+Number(t.amount||0),0);

  let score = 0;
  if(receitasMes>0){ score = Math.max(0, Math.min(100, Math.round(((receitasMes-despesasMes)/receitasMes)*100))); }

  const mainGoal = goals[0] || null;

  const insights = [];
  if(accounts.length===0){
    insights.push({icon:'wallet', text:'Cadastre sua primeira <strong>conta</strong> para o Atlas começar a calcular seu patrimônio.'});
  }
  if(transactions.length===0){
    insights.push({icon:'bulb', text:'Adicione seus primeiros <strong>lançamentos</strong> para a Mona gerar insights personalizados.'});
  } else {
    if(despesasMes > receitasMes && receitasMes>0){
      insights.push({icon:'alert', text:`Suas despesas (${fmt(despesasMes)}) superaram as receitas (${fmt(receitasMes)}) este mês.`});
    } else if(receitasMes>0){
      insights.push({icon:'trend', text:`Você guardou <strong>${fmt(receitasMes-despesasMes)}</strong> este mês até agora. Continue assim.`});
    }
    const catTotals = {};
    mTx.filter(t=>t.kind==='despesa').forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+Number(t.amount||0); });
    const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
    if(topCat){ insights.push({icon:'bulb', text:`Sua maior categoria de gasto este mês é <strong>${topCat[0]}</strong>, com ${fmt(topCat[1])}.`}); }
  }
  if(mainGoal && mainGoal.target>0 && mainGoal.saved/mainGoal.target>=0.9 && mainGoal.saved/mainGoal.target<1){
    insights.push({icon:'sparkle', text:`Você está quase lá! A meta <strong>${mainGoal.name}</strong> está ${Math.round(mainGoal.saved/mainGoal.target*100)}% concluída.`});
  }

  return { netWorth, saldoDisponivel, receitasMes, despesasMes, score, mainGoal, insights: insights.slice(0,3) };
}

/* ===================== render: dashboard ===================== */
function renderDashboard(){
  const m = computeMetrics();
  const hour = new Date().getHours();
  const greet = hour<5?'Boa noite':hour<12?'Bom dia':hour<18?'Boa tarde':'Boa noite';
  const dateTxt = new Date().toLocaleDateString('pt-BR',{weekday:'long', day:'numeric', month:'long'});

  let goalBlock = '';
  if(m.mainGoal){
    const pct = m.mainGoal.target>0 ? Math.min(100, Math.round(m.mainGoal.saved/m.mainGoal.target*100)) : 0;
    goalBlock = `
      <section class="card goal-card fade-in" style="animation-delay:.30s">
        <div class="goal-head"><p class="label">Meta principal</p><span class="goal-pct">${pct}%</span></div>
        <p class="card-title">${m.mainGoal.name}</p>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <p class="card-sub">${fmt(m.mainGoal.saved)} de ${fmt(m.mainGoal.target)}</p>
      </section>`;
  } else {
    goalBlock = `
      <section class="card goal-card fade-in" style="animation-delay:.30s">
        <p class="label">Meta principal</p>
        <div class="empty-state" style="padding:10px 0;">
          <p>Você ainda não tem metas cadastradas.</p>
          <button class="btn btn-primary btn-sm" onclick="openGoalModal()">${icon('plus')} Criar meta</button>
        </div>
      </section>`;
  }

  const insightsHTML = m.insights.length ? m.insights.map(i=>`
    <div class="insight-card">
      <div class="insight-icon">${icon(i.icon)}</div>
      <p class="insight-text">${i.text}</p>
    </div>`).join('') : '';

  document.getElementById('viewRoot').innerHTML = `
    <section class="greeting fade-in" style="animation-delay:.05s">
      <h1>${greet}${profile.name ? ', '+profile.name : ''}</h1>
      <p class="muted">${dateTxt}</p>
    </section>

    <section class="hero-card fade-in" style="animation-delay:.12s">
      <p class="label">Patrimônio total</p>
      <p class="hero-number">${fmt(m.netWorth)}</p>
      <p class="muted" style="margin-top:2px;">${accounts.length} conta(s) cadastrada(s)</p>
    </section>

    <section class="grid-2">
      <div class="card fade-in" style="animation-delay:.18s">
        <p class="label">Saldo disponível</p>
        <p class="card-number">${fmt(m.saldoDisponivel)}</p>
      </div>
      <div class="card fade-in" style="animation-delay:.24s">
        <p class="label">Despesas do mês</p>
        <p class="card-number">${fmt(m.despesasMes)}</p>
        <p class="card-sub">Receitas: ${fmt(m.receitasMes)}</p>
      </div>
    </section>

    ${goalBlock}

    <section class="card health-card fade-in" style="animation-delay:.36s">
      <p class="label" style="text-align:center;">Saúde financeira</p>
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 200" class="gauge">
          <path class="gauge-track" d="${describeArc(100,100,80,225,495)}" />
          <path class="gauge-progress" id="gaugeProgress" d="${describeArc(100,100,80,225,225)}" />
        </svg>
        <div class="gauge-center">
          <span class="gauge-number" id="gaugeNumber">0</span>
          <span class="gauge-max">/ 100</span>
          <span class="gauge-status">${statusFor(m.score)}</span>
        </div>
      </div>
    </section>

    ${insightsHTML ? `<section class="insights">
      <p class="section-title fade-in" style="animation-delay:.42s">${icon('sparkle')} Insights da Mona</p>
      ${insightsHTML}
    </section>` : ''}
  `;

  animateGauge(m.score);
}

function animateGauge(target){
  const path = document.getElementById('gaugeProgress');
  const numberEl = document.getElementById('gaugeNumber');
  if(!path) return;
  const duration = 1000, start = performance.now();
  function frame(now){
    const t = Math.min(1, (now-start)/duration);
    const eased = 1 - Math.pow(1-t, 3);
    const val = eased*target;
    path.setAttribute('d', describeArc(100,100,80,225,225+270*(val/100)));
    numberEl.textContent = Math.round(val);
    if(t<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ===================== render: lançamentos ===================== */
let txFilter = 'todos';
function renderLancamentos(){
  const list = transactions
    .filter(t => txFilter==='todos' ? true : t.kind===txFilter)
    .sort((a,b)=> new Date(b.date) - new Date(a.date));

  const rows = list.map(t=>{
    const acc = accounts.find(a=>a.id===t.accountId);
    const dateTxt = new Date(t.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    return `
      <div class="list-item">
        <div class="list-icon">${icon(t.kind==='receita'?'income':'expense')}</div>
        <div class="list-main">
          <p class="list-title">${t.desc || t.category}</p>
          <p class="list-sub">${t.category} · ${dateTxt}${acc?(' · '+acc.name):''}</p>
        </div>
        <span class="list-amount ${t.kind==='receita'?'positive':'negative'}">${t.kind==='receita'?'+':'-'} ${fmt(t.amount)}</span>
        <button class="icon-btn" onclick="deleteTransaction('${t.id}')">${icon('trash')}</button>
      </div>`;
  }).join('');

  document.getElementById('viewRoot').innerHTML = `
    <h2 class="view-title fade-in">Lançamentos</h2>
    <div class="filter-tabs fade-in" style="animation-delay:.05s">
      <div class="filter-tab ${txFilter==='todos'?'active':''}" onclick="setTxFilter('todos')">Todos</div>
      <div class="filter-tab ${txFilter==='receita'?'active':''}" onclick="setTxFilter('receita')">Receitas</div>
      <div class="filter-tab ${txFilter==='despesa'?'active':''}" onclick="setTxFilter('despesa')">Despesas</div>
    </div>
    ${list.length ? rows : `
      <div class="empty-state fade-in">
        ${icon('wallet')}
        <p>Nenhum lançamento ainda. Adicione sua primeira receita ou despesa.</p>
        <button class="btn btn-primary" onclick="openTransactionModal()">${icon('plus')} Adicionar lançamento</button>
      </div>`}
  `;
}
function setTxFilter(f){ txFilter = f; renderLancamentos(); }
async function deleteTransaction(id){
  transactions = transactions.filter(t=>t.id!==id);
  await saveData('atlas:transactions', transactions);
  renderView();
}

/* ===================== render: contas ===================== */
function renderContas(){
  const rows = accounts.map(a=>`
    <div class="list-item account-item">
      <div class="list-icon">${icon('wallet')}</div>
      <div class="list-main">
        <p class="list-title">${a.name}</p>
        <p class="list-sub">${a.type}</p>
      </div>
      <span class="list-amount">${fmt(a.balance)}</span>
      <button class="icon-btn" onclick="deleteAccount('${a.id}')">${icon('trash')}</button>
    </div>`).join('');

  document.getElementById('viewRoot').innerHTML = `
    <h2 class="view-title fade-in">Contas</h2>
    ${accounts.length ? rows : `
      <div class="empty-state fade-in">
        ${icon('wallet')}
        <p>Nenhuma conta cadastrada. Adicione sua conta corrente, carteira ou poupança.</p>
        <button class="btn btn-primary" onclick="openAccountModal()">${icon('plus')} Adicionar conta</button>
      </div>`}
  `;
}
async function deleteAccount(id){
  accounts = accounts.filter(a=>a.id!==id);
  await saveData('atlas:accounts', accounts);
  renderView();
}

/* ===================== render: metas ===================== */
function renderMetas(){
  const rows = goals.map(g=>{
    const pct = g.target>0 ? Math.min(100, Math.round(g.saved/g.target*100)) : 0;
    return `
      <section class="card goal-card">
        <div class="goal-head"><p class="label">Meta</p><span class="goal-pct">${pct}%</span></div>
        <p class="card-title">${g.name}</p>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <p class="card-sub">${fmt(g.saved)} de ${fmt(g.target)}</p>
        <div class="goal-actions">
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="openAporteModal('${g.id}')">+ Aporte</button>
          <button class="btn btn-secondary btn-sm" onclick="deleteGoal('${g.id}')">${icon('trash')}</button>
        </div>
      </section>`;
  }).join('');

  document.getElementById('viewRoot').innerHTML = `
    <h2 class="view-title fade-in">Metas</h2>
    ${goals.length ? rows : `
      <div class="empty-state fade-in">
        ${icon('target')}
        <p>Nenhuma meta ainda. Que sonho você quer conquistar primeiro?</p>
        <button class="btn btn-primary" onclick="openGoalModal()">${icon('plus')} Criar meta</button>
      </div>`}
  `;
}
async function deleteGoal(id){
  goals = goals.filter(g=>g.id!==id);
  await saveData('atlas:goals', goals);
  renderView();
}

/* ===================== render: mais ===================== */
function renderMais(){
  const upcoming = [
    'Cartões','Contas a Pagar','Calendário Financeiro','Patrimônio detalhado',
    'Investimentos','Clientes','Projetos','Relatórios','IA Mona (chat)','Configurações'
  ];
  document.getElementById('viewRoot').innerHTML = `
    <h2 class="view-title fade-in">Mais</h2>
    <div class="card fade-in">
      ${upcoming.map(m=>`
        <div class="mais-item">
          <div class="list-icon">${icon('sparkle')}</div>
          <p class="list-title" style="flex:1; margin:0;">${m}</p>
          <span class="tag-soon">Em breve</span>
        </div>`).join('')}
    </div>
    <p class="muted" style="margin-top:14px; text-align:center;">Atlas v0.1 · feito só pra você, no seu iPhone.</p>
  `;
}

/* ===================== view switching ===================== */
function renderView(){
  if(currentView==='dashboard') renderDashboard();
  else if(currentView==='lancamentos') renderLancamentos();
  else if(currentView==='contas') renderContas();
  else if(currentView==='metas') renderMetas();
  else if(currentView==='mais') renderMais();

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===currentView));
  const fab = document.getElementById('fab');
  const fabMap = { lancamentos:openTransactionModal, contas:openAccountModal, metas:openGoalModal };
  if(fabMap[currentView]){ fab.classList.remove('hidden'); fab.onclick = fabMap[currentView]; }
  else { fab.classList.add('hidden'); }
}
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{ currentView = t.dataset.view; renderView(); });
});

/* ===================== modais ===================== */
const overlay = document.getElementById('modalOverlay');
const sheet = document.getElementById('modalSheet');
function closeModal(){ overlay.classList.remove('open'); }
function openModalWith(html){ sheet.innerHTML = html; overlay.classList.add('open'); }
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

function openAccountModal(){
  openModalWith(`
    <div class="modal-header"><h3>Nova conta</h3><button class="modal-close" onclick="closeModal()">${icon('plus')}</button></div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-control" id="f-nome" placeholder="Ex: Nubank, Carteira"/></div>
    <div class="form-group"><label class="form-label">Tipo</label>
      <select class="form-control" id="f-tipo">${ACCOUNT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label class="form-label">Saldo atual</label><input class="form-control" id="f-saldo" type="number" step="0.01" placeholder="0,00"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitAccount()">Salvar</button>
    </div>
  `);
}
async function submitAccount(){
  const name = document.getElementById('f-nome').value.trim();
  if(!name) return;
  const type = document.getElementById('f-tipo').value;
  const balance = parseFloat(document.getElementById('f-saldo').value) || 0;
  accounts.push({ id: uid(), name, type, balance });
  await saveData('atlas:accounts', accounts);
  closeModal(); renderView();
}

function openTransactionModal(){
  openModalWith(`
    <div class="modal-header"><h3>Novo lançamento</h3><button class="modal-close" onclick="closeModal()">${icon('plus')}</button></div>
    <div class="form-group">
      <div class="segmented">
        <button id="seg-receita" class="active" onclick="setTxKind('receita')">Receita</button>
        <button id="seg-despesa" onclick="setTxKind('despesa')">Despesa</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-control" id="f-desc" placeholder="Ex: Supermercado"/></div>
    <div class="form-group"><label class="form-label">Valor</label><input class="form-control" id="f-valor" type="number" step="0.01" placeholder="0,00"/></div>
    <div class="form-group"><label class="form-label">Categoria</label><select class="form-control" id="f-cat"></select></div>
    <div class="form-group"><label class="form-label">Conta</label>
      <select class="form-control" id="f-conta">${accounts.length? accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('') : '<option value="">Nenhuma conta cadastrada</option>'}</select>
    </div>
    <div class="form-group"><label class="form-label">Data</label><input class="form-control" id="f-data" type="date" value="${todayISO()}"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitTransaction()">Salvar</button>
    </div>
  `);
  setTxKind('receita');
}
let pendingTxKind = 'receita';
function setTxKind(kind){
  pendingTxKind = kind;
  document.getElementById('seg-receita').classList.toggle('active', kind==='receita');
  document.getElementById('seg-despesa').classList.toggle('active', kind==='despesa');
  const cats = kind==='receita' ? RECEITA_CATS : DESPESA_CATS;
  document.getElementById('f-cat').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
}
async function submitTransaction(){
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-valor').value);
  if(!amount || amount<=0) return;
  const category = document.getElementById('f-cat').value;
  const accountId = document.getElementById('f-conta').value;
  const date = document.getElementById('f-data').value || todayISO();
  transactions.push({ id: uid(), kind: pendingTxKind, desc, amount, category, accountId, date });

  const acc = accounts.find(a=>a.id===accountId);
  if(acc){ acc.balance = Number(acc.balance||0) + (pendingTxKind==='receita' ? amount : -amount); await saveData('atlas:accounts', accounts); }

  await saveData('atlas:transactions', transactions);
  closeModal(); renderView();
}

function openGoalModal(){
  openModalWith(`
    <div class="modal-header"><h3>Nova meta</h3><button class="modal-close" onclick="closeModal()">${icon('plus')}</button></div>
    <div class="form-group"><label class="form-label">Nome da meta</label><input class="form-control" id="f-gnome" placeholder="Ex: Viagem para o Japão"/></div>
    <div class="form-group"><label class="form-label">Valor objetivo</label><input class="form-control" id="f-gtarget" type="number" step="0.01" placeholder="0,00"/></div>
    <div class="form-group"><label class="form-label">Já guardado (opcional)</label><input class="form-control" id="f-gsaved" type="number" step="0.01" placeholder="0,00"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitGoal()">Salvar</button>
    </div>
  `);
}
async function submitGoal(){
  const name = document.getElementById('f-gnome').value.trim();
  const target = parseFloat(document.getElementById('f-gtarget').value);
  if(!name || !target) return;
  const saved = parseFloat(document.getElementById('f-gsaved').value) || 0;
  goals.push({ id: uid(), name, target, saved });
  await saveData('atlas:goals', goals);
  closeModal(); renderView();
}

function openAporteModal(goalId){
  openModalWith(`
    <div class="modal-header"><h3>Adicionar aporte</h3><button class="modal-close" onclick="closeModal()">${icon('plus')}</button></div>
    <div class="form-group"><label class="form-label">Quanto deseja adicionar?</label><input class="form-control" id="f-aporte" type="number" step="0.01" placeholder="0,00"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitAporte('${goalId}')">Adicionar</button>
    </div>
  `);
}
async function submitAporte(goalId){
  const valor = parseFloat(document.getElementById('f-aporte').value);
  if(!valor || valor<=0) return;
  const g = goals.find(g=>g.id===goalId);
  if(g){ g.saved = Number(g.saved||0) + valor; await saveData('atlas:goals', goals); }
  closeModal(); renderView();
}

function openNameModal(){
  openModalWith(`
    <div class="modal-header"><h3>Bem-vinda(o) ao Atlas</h3></div>
    <div class="form-group"><label class="form-label">Como posso te chamar?</label><input class="form-control" id="f-profname" placeholder="Seu nome"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="skipProfile()">Pular</button>
      <button class="btn btn-primary" onclick="submitProfile()">Continuar</button>
    </div>
  `);
}
async function submitProfile(){
  profile.name = document.getElementById('f-profname').value.trim();
  await saveData('atlas:profile', profile);
  closeModal(); renderView();
}
async function skipProfile(){ closeModal(); renderView(); }

/* ===================== tema ===================== */
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const body = document.body;
  body.setAttribute('data-theme', body.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
});

/* ===================== starfield decorativo ===================== */
const starfield = document.getElementById('starfield');
for(let i=0;i<26;i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*70+'%';
  s.style.animationDelay = (Math.random()*4)+'s';
  s.style.opacity = (0.2+Math.random()*0.5).toFixed(2);
  starfield.appendChild(s);
}

/* ===================== init ===================== */
async function init(){
  [profile, accounts, transactions, goals] = await Promise.all([
    loadData('atlas:profile', {name:''}),
    loadData('atlas:accounts', []),
    loadData('atlas:transactions', []),
    loadData('atlas:goals', [])
  ]);
  renderView();
  if(!profile || !profile.name){ setTimeout(openNameModal, 400); }
}
init();

/* ===================== PWA: registro do Service Worker inline ===================== */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'atlas-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('', {status: 408})))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
